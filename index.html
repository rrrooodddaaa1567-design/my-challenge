<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACCESS RESTRICTED</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #00ffcc;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            border: 1px solid #00ffcc;
            padding: 30px;
            background: rgba(0, 255, 204, 0.05);
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.2);
            border-radius: 10px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        .glitch { animation: flash 1.5s infinite; font-size: 1.5rem; }
        @keyframes flash { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        input {
            padding: 12px; font-size: 16px; width: 100%; background: #111;
            border: 1px solid #00ffcc; color: #00ffcc; outline: none;
            box-sizing: border-box; text-align: center; margin-top: 20px;
        }
        button {
            margin-top: 15px; padding: 12px; width: 100%;
            background-color: #00ffcc; color: #000; border: none;
            font-weight: bold; cursor: pointer;
        }
        #result { margin-top: 20px; font-weight: bold; }
        .error-shake { animation: shake 0.4s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="glitch">⚠️ ACCESS RESTRICTED</h1>
        <p>أنا عنصر لا أرى بالعين المجردة، وبدوني لا تعيش الكائنات… من أنا؟</p>
        <input type="text" id="answer" placeholder="اكتبي الإجابة هنا...">
        <button onclick="checkAnswer()">تأكيد الهوية</button>
        <p id="result"></p>
    </div>

    <script>
        function normalize(text) {
            return text.trim().toLowerCase()
                .replace(/[أإآ]/g, "ا")
                .replace(/^ال/, "")
                .replace(/\s+/g, "");
        }

        function checkAnswer() {
            const inputField = document.getElementById("answer");
            const resultText = document.getElementById("result");
            const ans = normalize(inputField.value);
            const validAnswers = ["اكسجين", "oxygen", "o2", "o"];

            if (validAnswers.some(word => ans.includes(word))) {
                new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3").play();
                document.body.innerHTML = `
                    <div class="container">
                        <h1>🔬 تم فك التشفير</h1>
                        <hr style="border: 0.5px solid #00ffcc">
                        <p>📍 الموقع: القاعة الكبرى</p>
                        <p>⏰ الوقت: 09:00 مساءً</p>
                        <button onclick="location.reload()">خروج</button>
                    </div>`;
            } else {
                new Audio("https://www.soundjay.com/buttons/sounds/button-10.mp3").play();
                resultText.innerText = "❌ الوصول مرفوض!";
                resultText.style.color = "#ff4444";
                document.querySelector(".container").classList.add("error-shake");
                setTimeout(() => document.querySelector(".container").classList.remove("error-shake"), 400);
            }
        }
    </script>
</body>
</html>
