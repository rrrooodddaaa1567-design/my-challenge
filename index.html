<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DORZA SYSTEM</title>
    <style>
        body { background: #000; color: #00ffcc; font-family: monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .container { border: 2px solid #00ffcc; padding: 30px; background: rgba(0, 255, 204, 0.05); border-radius: 15px; width: 85%; max-width: 400px; text-align: center; }
        input { padding: 15px; font-size: 16px; width: 100%; background: #000; border: 2px solid #00cccc; color: #00ffcc; margin-top: 20px; box-sizing: border-box; border-radius: 8px; outline: none; text-align: center; }
        button { margin-top: 20px; padding: 15px; width: 100%; background: #00ffcc; color: #000; border: none; font-weight: bold; cursor: pointer; border-radius: 8px; }
        .error { color: #ff4444; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container" id="box">
        <h1>⚠️ نظام Dorza</h1>
        <p>أنا عنصر لا أرى بالعين المجردة، وبدوني لا تعيش الكائنات… من أنا؟</p>
        <input type="text" id="userInp" placeholder="اكتبي هنا...">
        <button onclick="startCheck()">تأكيد</button>
        <p id="msg" class="error"></p>
    </div>

    <script>
        function startCheck() {
            const val = document.getElementById("userInp").value.trim().toLowerCase();
            const msg = document.getElementById("msg");
            
            // تنظيف الإجابة من الهمزات وال التعريف
            const cleanVal = val.replace(/[أإآ]/g, "ا").replace(/^ال/, "");

            if (cleanVal === "اكسجين" || cleanVal === "oxygen") {
                document.getElementById("box").innerHTML = `
                    <h1>🔬 تم التحقق</h1>
                    <hr style="border:1px solid #00ffcc">
                    <p>📍 الموقع: معمل الفيزياء </p>
                    <p>⏰ الوقت:يوم الاثنين الحصة الثانيه</p>
                `;
            } else {
                msg.innerText = "❌ إجابة خاطئة!";
                setTimeout(() => { msg.innerText = ""; }, 2000);
            }
        }
    </script>
</body>
</html>
